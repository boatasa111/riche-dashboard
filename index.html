<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Riche Business — Internal Tools</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  :root {
    --bg: #f8f7f4;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.1);
    --border-hover: rgba(0,0,0,0.25);
    --text-primary: #1a1a1a;
    --text-secondary: #6b6b6b;
    --radius-md: 8px;
    --radius-lg: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans Thai', 'Pyidaungsu', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    color: var(--text-primary);
  }
  .container { max-width: 900px; margin: 0 auto; padding: 0 24px 48px; }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 0 20px;
    border-bottom: 0.5px solid var(--border);
    margin-bottom: 28px;
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand-icon {
    width: 48px; height: 48px;
    border-radius: 14px;
    background: #EEEDFE;
    display: flex; align-items: center; justify-content: center;
  }
  .brand-icon i { font-size: 26px; color: #534AB7; }
  .brand-name { font-size: 22px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.02em; }
  .brand-sub { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

  .right-top { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
  .lang-switcher { display: flex; gap: 4px; }
  .lang-btn {
    font-size: 12px; padding: 4px 12px;
    border-radius: 6px;
    border: 0.5px solid var(--border-hover);
    background: var(--surface);
    color: var(--text-secondary);
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  .lang-btn:hover { background: #f0efff; }
  .lang-btn.active { background: #EEEDFE; color: #3C3489; border-color: #AFA9EC; font-weight: 600; }
  .clock-time { font-size: 28px; font-weight: 600; color: var(--text-primary); text-align: right; line-height: 1; letter-spacing: -0.02em; }
  .clock-date { font-size: 12px; color: var(--text-secondary); text-align: right; margin-top: 4px; }

  .hint {
    font-size: 13px; color: var(--text-secondary);
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 6px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
  }

  .card {
    border-radius: var(--radius-lg);
    border: 0.5px solid var(--border);
    background: var(--surface);
    cursor: grab;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: border-color 0.15s, transform 0.1s;
    user-select: none;
  }
  .card:hover { border-color: var(--border-hover); }
  .card.dragging { opacity: 0.3; cursor: grabbing; transform: scale(0.97); }
  .card.drag-over { border-width: 2px; }

  .card-hero {
    height: 100px;
    display: flex; align-items: center; justify-content: center;
  }
  .card-logo { display: flex; flex-direction: column; align-items: center; gap: 7px; }
  .logo-circle {
    width: 58px; height: 58px;
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-circle i { font-size: 30px; }
  .logo-abbr { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; }

  .card-body { padding: 13px 15px 15px; display: flex; flex-direction: column; gap: 5px; flex: 1; }
  .card-name { font-size: 14px; font-weight: 600; color: var(--text-primary); }
  .card-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.55; flex: 1; }
  .card-action { display: flex; justify-content: flex-end; margin-top: 8px; }

  .open-btn {
    font-size: 12px; font-weight: 600;
    padding: 6px 14px;
    border-radius: 7px;
    border: none;
    cursor: pointer;
    display: flex; align-items: center; gap: 5px;
    text-decoration: none;
    font-family: inherit;
    transition: opacity 0.15s;
  }
  .open-btn:hover { opacity: 0.85; }
  .open-btn i { font-size: 13px; }

  .local-badge {
    font-size: 11px; padding: 5px 9px;
    border-radius: 6px;
    background: #FAEEDA; color: #633806;
    display: flex; align-items: center; gap: 4px;
  }

  .save-note {
    font-size: 12px; color: var(--text-secondary);
    text-align: right; margin-top: 12px; min-height: 18px;
  }

  @media (max-width: 600px) {
    .top-bar { flex-direction: column; align-items: flex-start; gap: 16px; }
    .right-top { align-items: flex-start; }
    .clock-time { text-align: left; }
    .clock-date { text-align: left; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
  }
</style>
</head>
<body>
<div class="container">

  <div class="top-bar">
    <div class="brand">
      <div class="brand-icon"><i class="ti ti-building-estate"></i></div>
      <div>
        <div class="brand-name">The Riche Business</div>
        <div class="brand-sub" id="brand-sub">รวมทุกระบบไว้ในที่เดียว</div>
      </div>
    </div>
    <div class="right-top">
      <div class="lang-switcher">
        <button class="lang-btn active" onclick="setLang('th')">ไทย</button>
        <button class="lang-btn" onclick="setLang('en')">EN</button>
        <button class="lang-btn" onclick="setLang('my')">မြန်မာ</button>
      </div>
      <div>
        <div class="clock-time" id="clock">--:--:--</div>
        <div class="clock-date" id="datestr">--</div>
      </div>
    </div>
  </div>

  <p class="hint" id="hint"><i class="ti ti-arrows-move"></i> <span id="hint-text">ลากการ์ดเพื่อจัดเรียง — ตำแหน่งจะถูกจำอัตโนมัติ</span></p>

  <div class="grid" id="grid"></div>
  <p class="save-note" id="save-note"></p>

</div>

<script>
const LANG = {
  th: {

    open: 'เปิด', notDeployed: 'ยังไม่ deploy', rearranged: 'จัดเรียงใหม่แล้ว',
    days: ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัส','ศุกร์','เสาร์'],
    months: ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'],
    dateFormat: (d,day,mon,y) => `วัน${day}ที่ ${d} ${mon} ${y+543}`,
    cards: {

      hr:      { name: 'HR', desc: 'จัดการพนักงาน วันลา เงินเดือน' },
      parking: { name: 'Parking Lots', desc: 'จัดการที่จอดรถ ตรวจสอบสถานะ' },
      task:    { name: 'Task Flow', desc: 'จัดการงานและติดตามความคืบหน้า' },
      rowa:    { name: 'Rowa ขายของ', desc: 'ระบบออเดอร์และการขาย' },
      order:   { name: 'สั่งซื้อของ', desc: 'ระบบสั่งซื้อวัตถุดิบ' },
      set:     { name: 'SET Scanner', desc: 'สแกนและคัดกรองหุ้น SET50' },
      stonecamp: { name: 'Stone Camp', desc: 'ระบบจัดการ Camping & Nature Resort' },
      horpak:  { name: 'หอพัก', desc: 'ระบบจัดการหอพัก' },
      rental:  { name: '9Degrees เช่า', desc: 'ระบบจัดการการเช่าและผู้เช่า' },
      swiftlet:{ name: 'บ้านนก เพชรบุรี', desc: 'ระบบ ERP ฟาร์มรังนก จัดการค่าใช้จ่าย' },
      pos:     { name: 'Riche POS', desc: 'ระบบขายหน้าร้าน จัดการการขาย' },
    }
  },
  en: {
    brandSub: 'All systems in one place',
    hint: 'Drag cards to reorder — position is saved automatically',
    open: 'Open', notDeployed: 'Not deployed', rearranged: 'Order saved',
    days: ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],
    months: ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],
    dateFormat: (d,day,mon,y) => `${day}, ${d} ${mon} ${y}`,
    cards: {
      finbook: { name: 'Accounting & Stock', desc: 'Finance and inventory system' },
      hr:      { name: 'HR', desc: 'Manage staff, leave, payroll' },
      parking: { name: 'Parking Lots', desc: 'Parking management & status' },
      task:    { name: 'Task Flow', desc: 'Task management & tracking' },
      rowa:    { name: 'Rowa Sales', desc: 'Orders and sales system' },
      order:   { name: 'Purchase Orders', desc: 'Raw material ordering system' },
      set:     { name: 'SET Scanner', desc: 'SET50 stock screening tool' },
      stonecamp: { name: 'Stone Camp', desc: 'Camping & Nature Resort system' },
      horpak:  { name: 'Dormitory', desc: 'Dormitory management system' },
      rental:  { name: '9Degrees Rentals', desc: 'Rental & tenant management system' },
      swiftlet:{ name: 'Swiftlet ERP', desc: 'Bird nest farm ERP — Phetchaburi' },
      pos:     { name: 'Riche POS', desc: 'Point of sale system' },
    }
  },
  my: {
    brandSub: 'စနစ်အားလုံးကို တစ်နေရာတည်းတွင်',
    hint: 'ကတ်ပြားများကို ဆွဲ၍ စီစဉ်ပါ — အနေအထားကို အလိုအလျောက် မှတ်သားသည်',
    open: 'ဖွင့်သည်', notDeployed: 'မဖြန့်ကျက်ရသေး', rearranged: 'စီစဉ်ပြီးပါပြီ',
    days: ['တနင်္ဂနွေ','တနင်္လာ','အင်္ဂါ','ဗုဒ္ဓဟူး','ကြာသပတေး','သောကြာ','စနေ'],
    months: ['ဇန်','ဖေ','မတ်','ဧပြီ','မေ','ဇွန်','ဇူ','ဩ','စက်','အောက်','နို','ဒီ'],
    dateFormat: (d,day,mon,y) => `${day}၊ ${d} ${mon} ${y}`,
    cards: {
      finbook: { name: 'စာရင်း & စတော့', desc: 'ငွေကြေးနှင့် စတော့စီမံခန့်ခွဲမှုစနစ်' },
      hr:      { name: 'HR', desc: 'ဝန်ထမ်း၊ ခွင့်ရက်၊ လစာ စီမံခန့်ခွဲမှု' },
      parking: { name: 'ကားပါကင်', desc: 'ကားရပ်နားမှု စီမံခန့်ခွဲမှုစနစ်' },
      task:    { name: 'တာဝန်စီမံမှု', desc: 'လုပ်ငန်းတာဝန် ခြေရာခံစနစ်' },
      rowa:    { name: 'Rowa အရောင်း', desc: 'အော်ဒါနှင့် အရောင်းစနစ်' },
      order:   { name: 'ဝယ်ယူမှု', desc: 'ကုန်ကြမ်း မှာယူမှုစနစ်' },
      set:     { name: 'SET Scanner', desc: 'SET50 စတော့စစ်ထုတ်ရေးကိရိယာ' },
      stonecamp: { name: 'Stone Camp', desc: 'စခန်းနှင့် သဘာဝအပန်းဖြေစနစ်' },
      horpak:  { name: 'အိပ်ဆောင်', desc: 'အိပ်ဆောင်စီမံခန့်ခွဲမှုစနစ်' },
      rental:  { name: '9Degrees ငှားရမ်း', desc: 'ငှားရမ်းမှုနှင့် ငှားသူ စီမံခန့်ခွဲမှုစနစ်' },
      swiftlet:{ name: 'ငှက်သိုက်ခြံ ERP', desc: 'ငှက်သိုက်ခြံ ERP စနစ် — Phetchaburi' },
      pos:     { name: 'Riche POS', desc: 'အရောင်းကောင်တာစနစ်' },
    }
  }
};

const CARDS_BASE = [
  { id:'finbook', icon:'ti-report-money', abbr:'FIN',  heroBg:'#E6F1FB', logoBg:'#B5D4F4', logoColor:'#0C447C', abbrColor:'#0C447C', btnBg:'#378ADD', btnColor:'#fff', url:'https://finbook-chi.vercel.app', local:false },
  { id:'hr',      icon:'ti-users',        abbr:'HR',   heroBg:'#EAF3DE', logoBg:'#C0DD97', logoColor:'#27500A', abbrColor:'#3B6D11', btnBg:'#639922', btnColor:'#fff', url:'https://hr-pro-suite-seven.vercel.app/login', local:false },
  { id:'parking', icon:'ti-car',          abbr:'PKG',  heroBg:'#FAEEDA', logoBg:'#FAC775', logoColor:'#412402', abbrColor:'#633806', btnBg:'#BA7517', btnColor:'#fff', url:'https://dmk-parking.vercel.app/login', local:false },
  { id:'task',    icon:'ti-checkbox',     abbr:'TSK',  heroBg:'#EEEDFE', logoBg:'#CECBF6', logoColor:'#26215C', abbrColor:'#3C3489', btnBg:'#7F77DD', btnColor:'#fff', url:'https://task-flow-lovat-sigma.vercel.app/login', local:false },
  { id:'rowa',    icon:'ti-shopping-cart',abbr:'ROWA', heroBg:'#FAECE7', logoBg:'#F5C4B3', logoColor:'#4A1B0C', abbrColor:'#712B13', btnBg:'#D85A30', btnColor:'#fff', url:'https://rowa-app-web.vercel.app/orders', local:false },
  { id:'order',   icon:'ti-truck-delivery',abbr:'ORD', heroBg:'#FBEAF0', logoBg:'#F4C0D1', logoColor:'#4B1528', abbrColor:'#72243E', btnBg:'#D4537E', btnColor:'#fff', url:'http://localhost:3000/requests/new', local:true },
  { id:'set',     icon:'ti-trending-up',   abbr:'SET',  heroBg:'#E8F5E9', logoBg:'#A5D6A7', logoColor:'#1B5E20', abbrColor:'#2E7D32', btnBg:'#388E3C', btnColor:'#fff', url:'https://set-scanner.vercel.app', local:false },
  { id:'stonecamp', icon:'ti-tent',        abbr:'SC',   heroBg:'#F1EDE6', logoBg:'#D4B896', logoColor:'#4A2E10', abbrColor:'#6B3F18', btnBg:'#8B5E35', btnColor:'#fff', url:'https://stonecamp.live/login.php', local:false },
  { id:'horpak',    icon:'ti-building-arch', abbr:'HP', heroBg:'#E3EEF7', logoBg:'#9DC3E0', logoColor:'#0B3656', abbrColor:'#114A73', btnBg:'#2C7CB5', btnColor:'#fff', url:'https://horpak.vercel.app', local:false },
  { id:'rental',  icon:'ti-key',          abbr:'9DR',  heroBg:'#E0F2F1', logoBg:'#9CD3CD', logoColor:'#00403B', abbrColor:'#00695C', btnBg:'#00897B', btnColor:'#fff', url:'https://9degrees-rentals.vercel.app/admin', local:false },
  { id:'swiftlet',icon:'ti-bird',         abbr:'BN',   heroBg:'#E8EAF6', logoBg:'#9FA8DA', logoColor:'#1A237E', abbrColor:'#283593', btnBg:'#3F51B5', btnColor:'#fff', url:'https://swiftlet-erp.vercel.app/expenses', local:false },
  { id:'pos',     icon:'ti-cash-register',abbr:'POS',  heroBg:'#FDE7E9', logoBg:'#F2A8AD', logoColor:'#7A1118', abbrColor:'#B71C1C', btnBg:'#D32F2F', btnColor:'#fff', url:'https://riche-pos.vercel.app/login', local:false },
];

const KEY = 'riche_dash_order_v1';
const LANG_KEY = 'riche_dash_lang_v1';
let currentLang = localStorage.getItem(LANG_KEY) || 'th';
let order = (()=>{
  try {
    const ids = JSON.parse(localStorage.getItem(KEY) || 'null');
    if (ids) {
      const map = Object.fromEntries(CARDS_BASE.map(c => [c.id, c]));
      return [...ids.map(id => map[id]).filter(Boolean), ...CARDS_BASE.filter(c => !ids.includes(c.id))];
    }
  } catch(e) {}
  return [...CARDS_BASE];
})();

let dragSrc = null;

function setLang(lang) {
  currentLang = lang;
  try { localStorage.setItem(LANG_KEY, lang); } catch(e) {}
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.trim() === (lang==='th' ? 'ไทย' : lang==='en' ? 'EN' : 'မြန်မာ'));
  });
  const L = LANG[lang];
  document.getElementById('brand-sub').textContent = L.brandSub;
  document.getElementById('hint-text').textContent = L.hint;
  render();
  tick();
}

function render() {
  const L = LANG[currentLang];
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  order.forEach(card => {
    const lc = L.cards[card.id];
    const el = document.createElement('div');
    el.className = 'card';
    el.draggable = true;
    el.dataset.id = card.id;
    el.innerHTML = `
      <div class="card-hero" style="background:${card.heroBg}">
        <div class="card-logo">
          <div class="logo-circle" style="background:${card.logoBg}">
            <i class="ti ${card.icon}" style="color:${card.logoColor}"></i>
          </div>
          <span class="logo-abbr" style="color:${card.abbrColor}">${card.abbr}</span>
        </div>
      </div>
      <div class="card-body">
        <div class="card-name">${lc.name}</div>
        <div class="card-desc">${lc.desc}</div>
        <div class="card-action">
          ${card.local
            ? `<span class="local-badge"><i class="ti ti-wifi-off" style="font-size:11px"></i> ${L.notDeployed}</span>`
            : `<a class="open-btn" href="${card.url}" target="_blank" rel="noopener" style="background:${card.btnBg};color:${card.btnColor}"><i class="ti ti-external-link"></i> ${L.open}</a>`
          }
        </div>
      </div>`;
    el.addEventListener('dragstart', () => { dragSrc = card.id; setTimeout(() => el.classList.add('dragging'), 0); });
    el.addEventListener('dragend', () => { el.classList.remove('dragging'); grid.querySelectorAll('.card').forEach(c => c.classList.remove('drag-over')); });
    el.addEventListener('dragover', e => { e.preventDefault(); if (card.id !== dragSrc) el.classList.add('drag-over'); });
    el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
    el.addEventListener('drop', e => {
      e.preventDefault(); el.classList.remove('drag-over');
      if (dragSrc && dragSrc !== card.id) {
        const fi = order.findIndex(c => c.id === dragSrc);
        const ti = order.findIndex(c => c.id === card.id);
        const [moved] = order.splice(fi, 1);
        order.splice(ti, 0, moved);
        try { localStorage.setItem(KEY, JSON.stringify(order.map(c => c.id))); } catch(e) {}
        render();
        const n = document.getElementById('save-note');
        n.textContent = LANG[currentLang].rearranged;
        setTimeout(() => n.textContent = '', 2000);
      }
    });
    grid.appendChild(el);
  });
}

function tick() {
  const now = new Date();
  const L = LANG[currentLang];
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = `${h}:${m}:${s}`;
  document.getElementById('datestr').textContent = L.dateFormat(now.getDate(), L.days[now.getDay()], L.months[now.getMonth()], now.getFullYear());
}

setLang(currentLang);
setInterval(tick, 1000);
</script>
</body>
</html>
